$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
experiment_name: norgesgruppen_detection
display_name: yolov8m_640_diverse
compute: azureml:ainmxperis
environment:
  image: mcr.microsoft.com/azureml/curated/acpt-pytorch-2.2-cuda12.1:31
code: .
outputs:
  model_output:
    type: uri_folder
command: >-
  curl -LsSf https://astral.sh/uv/install.sh | sh && source $HOME/.local/bin/env && uv pip install --system ultralytics==8.1.0 pycocotools "numpy>=1.23,<2" &&
  python main.py detect --model yolov8m.pt --imgsz 640 --epochs 200 --batch 16 --name yolov8m_640_diverse --seed 123 --val-ratio 0.15 --optimizer SGD --lr0 0.01 --warmup-epochs 10 --mixup 0.2 --patience 40 &&
  cp runs/detect/yolov8m_640_diverse/weights/best.pt ${{outputs.model_output}}/yolov8m_640_diverse_best.pt &&
  cp runs/detect/yolov8m_640_diverse/weights/last.pt ${{outputs.model_output}}/yolov8m_640_diverse_last.pt &&
  cp -r runs/detect/yolov8m_640_diverse/*.png ${{outputs.model_output}}/ 2>/dev/null;
  cp -r runs/detect/yolov8m_640_diverse/*.csv ${{outputs.model_output}}/ 2>/dev/null;
  echo "=== Done ==="

$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
experiment_name: norgesgruppen_detection
display_name: yolov8x_640_heavymix
compute: azureml:ainmxperis
environment:
  image: mcr.microsoft.com/azureml/curated/acpt-pytorch-2.2-cuda12.1:31
code: .
outputs:
  model_output:
    type: uri_folder
command: >-
  curl -LsSf https://astral.sh/uv/install.sh | sh && source $HOME/.local/bin/env && uv pip install --system ultralytics==8.1.0 pycocotools "numpy>=1.23,<2" &&
  python main.py detect --model yolov8x.pt --imgsz 640 --epochs 200 --batch 8 --mixup 0.4 --copy-paste 0.25 --scale 0.8 --degrees 15.0 --patience 40 --name yolov8x_640_heavymix &&
  cp runs/detect/yolov8x_640_heavymix/weights/best.pt ${{outputs.model_output}}/yolov8x_640_heavymix_best.pt &&
  cp runs/detect/yolov8x_640_heavymix/weights/last.pt ${{outputs.model_output}}/yolov8x_640_heavymix_last.pt &&
  cp -r runs/detect/yolov8x_640_heavymix/*.csv ${{outputs.model_output}}/ 2>/dev/null;
  cp -r runs/detect/yolov8x_640_heavymix/*.png ${{outputs.model_output}}/ 2>/dev/null;
  echo "=== Done ==="

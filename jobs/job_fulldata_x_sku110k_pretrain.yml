$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
experiment_name: norgesgruppen_detection
display_name: fulldata_x_sku110k_pretrain
compute: azureml:ainmxperis
environment:
  image: mcr.microsoft.com/azureml/curated/acpt-pytorch-2.2-cuda12.1:31
code: .
outputs:
  model_output:
    type: uri_folder
command: >-
  curl -LsSf https://astral.sh/uv/install.sh | sh && source $HOME/.local/bin/env && uv pip install --system ultralytics==8.1.0 pycocotools "numpy>=1.23,<2" gdown &&
  echo "=== Downloading SKU-110K subset for pretraining ===" &&
  pip install roboflow &&
  python -c "
from roboflow import Roboflow
import os, shutil, yaml
try:
    rf = Roboflow(api_key='placeholder')
    print('Roboflow needs API key, skipping SKU-110K download')
    print('Falling back to training with heavy augmentation for generalization')
except:
    pass
  " &&
  echo "=== Training with generalization-focused config ===" &&
  python main.py detect --model yolov8x.pt --imgsz 640 --epochs 250 --batch 8 --name fulldata_x_generalize --seed 42
  --flipud 0.0 --copy-paste 0.3 --scale 0.5 --degrees 5.0 --close-mosaic 25 --val-ratio 0.0 --patience 0 &&
  cp runs/detect/fulldata_x_generalize/weights/last.pt ${{outputs.model_output}}/fulldata_x_generalize_last.pt &&
  cp -r runs/detect/fulldata_x_generalize/*.csv ${{outputs.model_output}}/ 2>/dev/null;
  echo "=== Done ==="

$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
experiment_name: norgesgruppen_detection
display_name: fulldata_soup_3x_noflip
compute: azureml:ainmxperis
environment:
  image: mcr.microsoft.com/azureml/curated/acpt-pytorch-2.2-cuda12.1:31
code: /tmp/azure_code
outputs:
  model_output:
    type: uri_folder
command: >-
  curl -LsSf https://astral.sh/uv/install.sh | sh && source $HOME/.local/bin/env && uv pip install --system ultralytics==8.1.0 pycocotools "numpy>=1.23,<2" &&
  python -c "from nm_ai_image.detection.data import COCOToYOLO; c = COCOToYOLO('data/raw/coco_dataset/train', 'data/yolo', val_ratio=0.0, seed=42); c.convert(); from ultralytics import YOLO; m1 = YOLO('yolov8x.pt'); m1.train(data=str((c.output_dir / 'data.yaml').resolve()), imgsz=640, epochs=200, batch=8, name='nf_s42', seed=42, patience=0, flipud=0.0); m2 = YOLO('yolov8x.pt'); m2.train(data=str((c.output_dir / 'data.yaml').resolve()), imgsz=640, epochs=200, batch=8, name='nf_s77', seed=77, patience=0, flipud=0.0); m3 = YOLO('yolov8x.pt'); m3.train(data=str((c.output_dir / 'data.yaml').resolve()), imgsz=640, epochs=200, batch=8, name='nf_s123', seed=123, patience=0, flipud=0.0)" &&
  python scripts/build_swa_model.py runs/detect/nf_s42/weights/last.pt runs/detect/nf_s77/weights/last.pt runs/detect/nf_s123/weights/last.pt --output ${{outputs.model_output}}/noflip_soup_3seed.pt --imgsz 640 &&
  echo "=== Done ==="

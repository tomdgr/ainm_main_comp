$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
experiment_name: norgesgruppen_detection
display_name: noflip_standalone_s42
compute: azureml:ainmxperis
environment:
  image: mcr.microsoft.com/azureml/curated/acpt-pytorch-2.2-cuda12.1:31
code: .
outputs:
  model_output:
    type: uri_folder
command: >-
  curl -LsSf https://astral.sh/uv/install.sh | sh && source $HOME/.local/bin/env && uv pip install --system ultralytics==8.1.0 pycocotools "numpy>=1.23,<2" &&
  ls -la && ls data/raw/coco_dataset/train/ && echo "=== Files verified ===" &&
  python -c "
  import json, shutil;
  from pathlib import Path;
  from pycocotools.coco import COCO;
  from ultralytics import YOLO;
  coco = COCO('data/raw/coco_dataset/train/annotations.json');
  cats = {c['id']: c['name'] for c in coco.loadCats(coco.getCatIds())};
  nc = len(cats);
  yolo_dir = Path('data/yolo_tmp');
  img_dir = yolo_dir / 'images' / 'train';
  lbl_dir = yolo_dir / 'labels' / 'train';
  img_dir.mkdir(parents=True, exist_ok=True);
  lbl_dir.mkdir(parents=True, exist_ok=True);
  src_img = Path('data/raw/coco_dataset/train/images');
  for img_id in coco.getImgIds():
      info = coco.loadImgs(img_id)[0];
      src = src_img / info['file_name'];
      shutil.copy2(src, img_dir / info['file_name']);
      anns = coco.loadAnns(coco.getAnnIds(imgIds=img_id));
      lines = [];
      for a in anns:
          x,y,w,h = a['bbox'];
          cx = (x + w/2) / info['width'];
          cy = (y + h/2) / info['height'];
          nw = w / info['width'];
          nh = h / info['height'];
          lines.append(f\"{a['category_id']} {cx} {cy} {nw} {nh}\");
      stem = Path(info['file_name']).stem;
      (lbl_dir / f'{stem}.txt').write_text('\n'.join(lines));
  yaml_content = f'path: {yolo_dir.resolve()}\ntrain: images/train\nval: images/train\nnc: {nc}\nnames: {list(cats.values())}';
  (yolo_dir / 'data.yaml').write_text(yaml_content);
  m = YOLO('yolov8x.pt');
  m.train(data=str((yolo_dir / 'data.yaml').resolve()), imgsz=640, epochs=200, batch=8, name='noflip_s42', seed=42, patience=0, flipud=0.0);
  print('Training complete')
  " &&
  cp runs/detect/noflip_s42/weights/last.pt ${{outputs.model_output}}/noflip_s42_last.pt &&
  cp -r runs/detect/noflip_s42/*.csv ${{outputs.model_output}}/ 2>/dev/null;
  echo "=== Done ==="

$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
experiment_name: norgesgruppen_detection
display_name: fulldata_x_labelsmooth
compute: azureml:ainmxperis
environment:
  image: mcr.microsoft.com/azureml/curated/acpt-pytorch-2.2-cuda12.1:31
code: .
outputs:
  model_output:
    type: uri_folder
command: >-
  curl -LsSf https://astral.sh/uv/install.sh | sh && source $HOME/.local/bin/env && uv pip install --system ultralytics==8.1.0 pycocotools "numpy>=1.23,<2" &&
  python -c "from nm_ai_image.detection.data import COCOToYOLO; c = COCOToYOLO('data/raw/coco_dataset', 'data/yolo', val_ratio=0.0, seed=42); c.convert(); from ultralytics import YOLO; m = YOLO('yolov8x.pt'); m.train(data=str((c.output_dir / 'data.yaml').resolve()), imgsz=640, epochs=200, batch=8, name='fulldata_x_labelsmooth', seed=42, patience=0, label_smoothing=0.05)" &&
  cp runs/detect/fulldata_x_labelsmooth/weights/last.pt ${{outputs.model_output}}/fulldata_x_labelsmooth_last.pt &&
  cp -r runs/detect/fulldata_x_labelsmooth/*.csv ${{outputs.model_output}}/ 2>/dev/null;
  echo "=== Done ==="

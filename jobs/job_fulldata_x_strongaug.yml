$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
experiment_name: norgesgruppen_detection
display_name: fulldata_x_strongaug
compute: azureml:ainmxperis
environment:
  image: mcr.microsoft.com/azureml/curated/acpt-pytorch-2.2-cuda12.1:31
code: .
outputs:
  model_output:
    type: uri_folder
command: >-
  curl -LsSf https://astral.sh/uv/install.sh | sh && source $HOME/.local/bin/env && uv pip install --system ultralytics==8.1.0 pycocotools "numpy>=1.23,<2" &&
  python main.py detect --model yolov8x.pt --imgsz 640 --epochs 250 --batch 8 --name fulldata_x_strongaug --seed 42
  --flipud 0.0 --copy-paste 0.3 --mixup 0.15 --scale 0.5 --degrees 5.0 --close-mosaic 30 --val-ratio 0.0 --patience 0 &&
  cp runs/detect/fulldata_x_strongaug/weights/last.pt ${{outputs.model_output}}/fulldata_x_strongaug_last.pt &&
  cp -r runs/detect/fulldata_x_strongaug/*.csv ${{outputs.model_output}}/ 2>/dev/null;
  echo "=== Done ==="

$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
experiment_name: norgesgruppen_detection
display_name: yolov8l_640_highaug
compute: azureml:ainmxperis
environment:
  image: mcr.microsoft.com/azureml/curated/acpt-pytorch-2.2-cuda12.1:31
code: .
outputs:
  model_output:
    type: uri_folder
command: >-
  curl -LsSf https://astral.sh/uv/install.sh | sh && source $HOME/.local/bin/env && uv pip install --system ultralytics==8.1.0 pycocotools "numpy>=1.23,<2" &&
  python main.py detect --model yolov8l.pt --imgsz 640 --epochs 200 --batch 16 --name yolov8l_640_highaug --mixup 0.3 --copy-paste 0.2 --scale 0.7 --degrees 10.0 --patience 40 &&
  cp runs/detect/yolov8l_640_highaug/weights/best.pt ${{outputs.model_output}}/yolov8l_640_highaug_best.pt &&
  cp runs/detect/yolov8l_640_highaug/weights/last.pt ${{outputs.model_output}}/yolov8l_640_highaug_last.pt &&
  cp -r runs/detect/yolov8l_640_highaug/*.png ${{outputs.model_output}}/ 2>/dev/null;
  cp -r runs/detect/yolov8l_640_highaug/*.csv ${{outputs.model_output}}/ 2>/dev/null;
  echo "=== Done ==="

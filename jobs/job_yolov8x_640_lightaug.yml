$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
experiment_name: norgesgruppen_detection
display_name: yolov8x_640_lightaug
compute: azureml:ainmxperis
environment:
  image: mcr.microsoft.com/azureml/curated/acpt-pytorch-2.2-cuda12.1:31
code: .
outputs:
  model_output:
    type: uri_folder
command: >-
  curl -LsSf https://astral.sh/uv/install.sh | sh && source $HOME/.local/bin/env && uv pip install --system ultralytics==8.1.0 pycocotools "numpy>=1.23,<2" &&
  python main.py detect --model yolov8x.pt --imgsz 640 --epochs 150 --batch 8 --seed 42 --name yolov8x_640_lightaug --patience 30 --mixup 0.0 --copy-paste 0.0 --scale 0.3 --degrees 0.0 --flipud 0.0 --mosaic 0.5 &&
  cp runs/detect/yolov8x_640_lightaug/weights/best.pt ${{outputs.model_output}}/yolov8x_640_lightaug_best.pt &&
  cp runs/detect/yolov8x_640_lightaug/weights/last.pt ${{outputs.model_output}}/yolov8x_640_lightaug_last.pt &&
  cp -r runs/detect/yolov8x_640_lightaug/*.csv ${{outputs.model_output}}/ 2>/dev/null;
  cp -r runs/detect/yolov8x_640_lightaug/*.png ${{outputs.model_output}}/ 2>/dev/null;
  echo "=== Done ==="

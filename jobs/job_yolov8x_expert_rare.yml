$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
experiment_name: norgesgruppen_detection
display_name: yolov8x_expert_rare50
compute: azureml:ainmxperis
environment:
  image: mcr.microsoft.com/azureml/curated/acpt-pytorch-2.2-cuda12.1:31
code: .
outputs:
  model_output:
    type: uri_folder
command: >-
  curl -LsSf https://astral.sh/uv/install.sh | sh && source $HOME/.local/bin/env && uv pip install --system ultralytics==8.1.0 pycocotools "numpy>=1.23,<2" &&
  python -c "
  import json, shutil, random
  from pathlib import Path
  from collections import defaultdict
  random.seed(42)
  with open('data/raw/coco_dataset/train/annotations.json') as f:
      coco = json.load(f)
  ann_per_cat = defaultdict(int)
  for a in coco['annotations']:
      ann_per_cat[a['category_id']] += 1
  rare_cats = {c for c, n in ann_per_cat.items() if n < 50}
  rare_imgs = set()
  for a in coco['annotations']:
      if a['category_id'] in rare_cats:
          rare_imgs.add(a['image_id'])
  all_imgs = set(img['id'] for img in coco['images'])
  other = list(all_imgs - rare_imgs)
  random.shuffle(other)
  keep_imgs = rare_imgs | set(other[:len(other)//3])
  new_coco = dict(coco)
  new_coco['images'] = [i for i in coco['images'] if i['id'] in keep_imgs]
  new_coco['annotations'] = [a for a in coco['annotations'] if a['image_id'] in keep_imgs]
  out = Path('data/raw/coco_expert')
  out.mkdir(parents=True, exist_ok=True)
  (out / 'images').mkdir(exist_ok=True)
  for img in new_coco['images']:
      src = Path('data/raw/coco_dataset/train/images') / img['file_name']
      if src.exists():
          shutil.copy2(src, out / 'images' / img['file_name'])
  with open(out / 'annotations.json', 'w') as f:
      json.dump(new_coco, f)
  print(f'Expert dataset: {len(new_coco[\"images\"])} images, {len(new_coco[\"annotations\"])} annotations')
  " &&
  python main.py detect --model yolov8x.pt --imgsz 640 --epochs 150 --batch 8 --name yolov8x_expert --coco-dir data/raw/coco_expert --patience 30 &&
  cp runs/detect/yolov8x_expert/weights/best.pt ${{outputs.model_output}}/yolov8x_expert_best.pt &&
  cp runs/detect/yolov8x_expert/weights/last.pt ${{outputs.model_output}}/yolov8x_expert_last.pt &&
  cp -r runs/detect/yolov8x_expert/*.csv ${{outputs.model_output}}/ 2>/dev/null;
  echo "=== Done ==="

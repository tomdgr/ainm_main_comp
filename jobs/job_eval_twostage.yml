$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
experiment_name: norgesgruppen_detection
display_name: eval_twostage_sweep
compute: azureml:ainmxperis
environment:
  image: mcr.microsoft.com/azureml/curated/acpt-pytorch-2.2-cuda12.1:31
code: .
outputs:
  model_output:
    type: uri_folder
command: >-
  curl -LsSf https://astral.sh/uv/install.sh | sh && source $HOME/.local/bin/env && uv pip install --system ultralytics==8.1.0 pycocotools "numpy>=1.23,<2" onnxruntime-gpu &&
  python main.py detect --model yolov8l.pt --imgsz 640 --epochs 150 --batch 8 --seed 77 --name eval_model --patience 30 &&
  python -c "from ultralytics import YOLO; m=YOLO('runs/detect/eval_model/weights/best.pt'); m.export(format='onnx', imgsz=640, opset=17, simplify=True)" &&
  python scripts/eval_twostage.py --onnx runs/detect/eval_model/weights/best.onnx --output-dir outputs/eval_twostage &&
  cp outputs/eval_twostage/results_summary.json ${{outputs.model_output}}/results_summary.json &&
  cp runs/detect/eval_model/weights/best.pt ${{outputs.model_output}}/yolov8l_640_s77_best.pt &&
  cp runs/detect/eval_model/weights/best.onnx ${{outputs.model_output}}/yolov8l_640_s77_best.onnx &&
  echo "=== Done ==="

$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
experiment_name: norgesgruppen_detection
display_name: noflip_clean_s999
compute: azureml:ainmxperis
environment:
  image: mcr.microsoft.com/azureml/curated/acpt-pytorch-2.2-cuda12.1:31
code: /tmp/azure_code
outputs:
  model_output:
    type: uri_folder
command: >-
  curl -LsSf https://astral.sh/uv/install.sh | sh && source $HOME/.local/bin/env && uv pip install --system ultralytics==8.1.0 pycocotools "numpy>=1.23,<2" &&
  python main.py detect --model yolov8x.pt --imgsz 640 --epochs 200 --batch 8 --name noflip_s999 --seed 999 --flipud 0.0 --val-ratio 0.0 --patience 0 &&
  cp runs/detect/noflip_s999/weights/last.pt ${{outputs.model_output}}/noflip_s999_last.pt &&
  cp -r runs/detect/noflip_s999/*.csv ${{outputs.model_output}}/ 2>/dev/null;
  echo "=== Done ==="
